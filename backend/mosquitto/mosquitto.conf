# Internal (Docker network — API subscriber)
listener 1883
listener_allow_anonymous false
password_file /farm-data/mosquitto/passwd
acl_file /farm-data/mosquitto/acl

# External production (TLS + per-device auth)
listener 8883
listener_allow_anonymous false
password_file /farm-data/mosquitto/passwd
acl_file /farm-data/mosquitto/acl
cafile /farm-data/mosquitto/certs/ca.crt
certfile /farm-data/mosquitto/certs/server.crt
keyfile /farm-data/mosquitto/certs/server.key
require_certificate false

persistence true
persistence_location /mosquitto/data/
log_dest stdout