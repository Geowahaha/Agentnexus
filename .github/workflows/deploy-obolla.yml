name: Deploy OBOLLA Edge (Worker)

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: Site URL for smoke test
        required: false
        default: https://obolla.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Deploy Worker (obolla.com)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env=""

      - name: Smoke health
        run: |
          curl -fsS "${{ inputs.site_url }}/health" | grep -q '"backend_reachable":true'